<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
</head>
<body>

<section class="contact-screen">

    <h2>ATENCIÓN AL CLIENTE</h2>

    <form class="contact-form">

        <label>Nombre*</label>
        <input type="text">

        <label>Apellidos*</label>
        <input type="text">

        <label>Email*</label>
        <input type="email">

        <label>Teléfono*</label>
        <input type="text">

        <label>Mensaje*</label>
        <textarea maxlength="3500"></textarea>

        <button class="btn-send">Enviar</button>

    </form>

</section>

</body>
</html>
