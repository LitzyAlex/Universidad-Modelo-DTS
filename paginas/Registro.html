<section class="screen register-screen">

<header class="top-bar">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</header>

    <form class="register-form">
        <h2 class="title">REGISTRARSE</h2>

        <label>Email</label>
        <input type="email" placeholder="Tu email">

        <label>Contraseña</label>
        <input type="password" placeholder="Tu contraseña">

        <div class="terms">
            <input type="checkbox" id="terms">
            <label for="terms">Acepto los Términos de servicio y las Políticas de privacidad</label>
        </div>

        <button class="btn primary">Crear cuenta</button>
        <p class="login-options">
        ¿Ya tiene una cuenta? <a href="Login.html">Iniciar sesión</a>
    </p>
    </form>
</section>
