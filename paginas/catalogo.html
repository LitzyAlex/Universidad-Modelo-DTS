<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<header class="top-bar">
    <div class="right-icons">
        <span class="menu-icon">☰</span>
        <span class="cart-icon">🛒</span>
    </div>
</header>

<section class="catalog-screen">

    <h2>Catálogo</h2>
    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar...">
    </div>


    <div class="product">
        <img src="../img/4.jpg" alt="" width="200px">
        <h3>Lip Divine Liquid Lipstick</h3>
        <p class="brand">Moira</p>
        <p class="price">$80</p>
        <button class="btn-add">Agregar al carrito</button>
    </div>

    <div class="product">
        <img src="../img/6.jpg" alt="" width="200px">
        <h3>Hydrating Core Lip Shine</h3>
        <p class="brand">e.l.f</p>
        <p class="price">$150</p>
        <button class="btn-add">Agregar al carrito</button>
    </div>

    <div class="product">
        <img src="../img/7.jpg" alt="" width="200px">
        <h3>Baby Lips</h3>
        <p class="brand">Maybelline New York</p>
        <p class="price">$100</p>
        <button class="btn-disabled">Agotado</button>
    </div>

</section>

</body>
</html>
