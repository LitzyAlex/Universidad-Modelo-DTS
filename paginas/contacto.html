<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/contacto.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<section class="contactUs">
    <div class="title">
        <h2>ATENCIÓN AL CLIENTE</h2>
    </div>
    <div class="box">
        <div class="contact form">
            <h3>Enviar un Mensaje</h3>
            <form>
                <div class="formBox">
                    <div class="row50">
                        <div class="inputBox">
                            <span>Nombre</span>
                            <input type="text" placeholder="Carlos">
                        </div>
                        <div class="inputBox">
                            <span>Apellido</span>
                            <input type="text" placeholder="Herrera">
                        </div>
                    </div>
                    <div class="row50">
                        <div class="inputBox">
                            <span>Email</span>
                            <input type="text" placeholder="example@email.com">
                        </div>
                        <div class="inputBox">
                            <span>Teléfono</span>
                            <input type="text" placeholder="+99 987 654 3210">
                        </div>
                    </div>
                    <div class="row100">
                        <div class="inputBox">
                            <span>Mensaje</span>
                            <textarea placeholder="Escribe tú mensaje aquí"></textarea>
                        </div>
                    </div>
                    <div class="row100">
                        <div class="inputBox">
                            <input type="submit" value="Enviar">
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="contact info">
            <h3>Información de Contacto</h3>
            <div class="infoBox">
                <div>
                    <span><ion-icon name="location"></ion-icon></span>
                    <p>Mérida, Yucatan <br>MÉXICO</p>
                </div>
                <div>
                    <span><ion-icon name="mail"></ion-icon></span>
                    <a href="#">example@email.com</a>
                </div>
                <div>
                    <span><ion-icon name="call"></ion-icon></span>
                    <a href="#">+99 987 654 3210</a>
                </div>
                <ul class="sci">
                    <li><a href="#"><ion-icon name="logo-facebook"></ion-icon></a></li>
                    <li><a href="#"><ion-icon name="logo-twitter"></ion-icon></a></li>
                    <li><a href="#"><ion-icon name="logo-linkedin"></ion-icon></a></li>
                    <li><a href="#"><ion-icon name="logo-instagram"></ion-icon></a></li>
                </ul>
            </div>
        </div>
        <div class="contact map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3724.104200179988!2d-89.5677716!3d21.0285163!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8f56776b58d5a3a7%3A0x3a4b86a60d39e603!2sUniversidad%20Modelo!5e0!3m2!1ses-419!2smx!4v1765383714812!5m2!1ses-419!2smx" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

</section>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
